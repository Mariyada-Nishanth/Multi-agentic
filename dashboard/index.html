<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Ops Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c0f;
      --bg-soft: #12171f;
      --panel: #11161e;
      --line: #1e2632;
      --text: #d8e1ee;
      --muted: #7e8a9b;
      --accent: #e05a1e;
      --live: #2ecc8a;
      --error: #e05252;
      --warn: #f0b429;
      --success: #2ecc8a;
      --info: #2a3444;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: radial-gradient(circle at 15% 10%, #1a1d24 0%, var(--bg) 42%) fixed;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.02),
        rgba(255, 255, 255, 0.02) 1px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
      mix-blend-mode: soft-light;
      opacity: 0.35;
      z-index: 50;
    }

    .shell {
      height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px;
      background: linear-gradient(90deg, #0f141b, #0b1017);
      border-bottom: 1px solid var(--line);
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .title {
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #f8d7c6;
      white-space: nowrap;
    }

    .repo-badge {
      border: 1px solid #5a2a17;
      background: rgba(224, 90, 30, 0.12);
      color: #ffb38e;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .live {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #c5f7de;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--live);
      box-shadow: 0 0 0 0 rgba(46, 204, 138, 0.7);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(46, 204, 138, 0.7); }
      70% { box-shadow: 0 0 0 9px rgba(46, 204, 138, 0); }
      100% { box-shadow: 0 0 0 0 rgba(46, 204, 138, 0); }
    }

    .filterbar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(12, 16, 22, 0.95);
      overflow-x: auto;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid #2a3546;
      color: #9db0c7;
      border-radius: 999px;
      padding: 6px 12px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 140ms ease;
    }

    .filter-btn:hover {
      border-color: #456487;
      color: #d8e1ee;
    }

    .filter-btn.active {
      color: #ffe4d7;
      border-color: #7d3518;
      background: rgba(224, 90, 30, 0.2);
    }

    .layout {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(220px, 260px) 1fr minmax(220px, 280px);
      gap: 12px;
      padding: 12px;
      min-height: 0;
    }

    .panel {
      background: linear-gradient(180deg, rgba(18, 23, 31, 0.96), rgba(12, 16, 22, 0.96));
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .panel h3 {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #a2afbf;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 10, 14, 0.6);
    }

    .agent-list {
      padding: 10px;
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .agent-card {
      border: 1px solid #243040;
      background: rgba(20, 27, 37, 0.8);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 5px;
    }

    .agent-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-running { background: var(--success); }
    .status-stopped { background: var(--error); }

    .agent-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .log-feed {
      overflow: auto;
      min-height: 0;
      padding: 8px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .empty {
      color: var(--muted);
      border: 1px dashed #2a3546;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      margin: 10px;
    }

    .log-row {
      border-left: 4px solid var(--info);
      border-radius: 8px;
      border-top: 1px solid #222c39;
      border-right: 1px solid #222c39;
      border-bottom: 1px solid #222c39;
      padding: 10px;
      background: rgba(19, 25, 35, 0.88);
      display: grid;
      gap: 7px;
      animation: slideIn 260ms ease;
    }

    @keyframes slideIn {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .log-row.level-error {
      border-left-color: var(--error);
      background: rgba(224, 82, 82, 0.08);
    }

    .log-row.level-warn { border-left-color: var(--warn); }
    .log-row.level-success { border-left-color: var(--success); }
    .log-row.level-info { border-left-color: var(--info); }

    .log-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }

    .pill {
      border-radius: 999px;
      padding: 2px 8px;
      border: 1px solid #2b3648;
      color: #bdd2ea;
      background: rgba(39, 50, 68, 0.56);
    }

    .level-badge {
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 10px;
      border-radius: 999px;
      padding: 2px 8px;
      border: 1px solid transparent;
    }

    .badge-error { color: #ffd0d0; border-color: #6c2d2d; background: rgba(224, 82, 82, 0.2); }
    .badge-warn { color: #ffefc5; border-color: #6c5421; background: rgba(240, 180, 41, 0.2); }
    .badge-success { color: #cbffe7; border-color: #215a42; background: rgba(46, 204, 138, 0.2); }
    .badge-info { color: #c6d6ea; border-color: #3f4d63; background: rgba(58, 72, 95, 0.25); }

    .log-message {
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      color: #dce7f7;
    }

    .stats {
      padding: 10px;
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .stat {
      border: 1px solid #273244;
      border-radius: 8px;
      padding: 10px;
      background: rgba(19, 25, 35, 0.75);
      display: grid;
      gap: 5px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #f0f5ff;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(320px, 1fr) auto;
      }
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="title-wrap">
        <div class="title">🦞 OpenClaw</div>
        <div class="repo-badge">vamshi2196/WAFFLE</div>
      </div>
      <div class="meta">
        <div class="live"><span class="live-dot"></span>LIVE</div>
        <div>Uptime: <span id="uptime">00:00:00</span></div>
      </div>
    </header>

    <div class="filterbar" id="filters"></div>

    <main class="layout">
      <section class="panel">
        <h3>Agents</h3>
        <div class="agent-list" id="agentList"></div>
      </section>

      <section class="panel">
        <h3>Live Logs</h3>
        <div class="log-feed" id="logFeed"></div>
      </section>

      <section class="panel">
        <h3>Stats</h3>
        <div class="stats" id="stats"></div>
      </section>
    </main>
  </div>

  <script>
    const filters = ['all', 'info', 'success', 'warn', 'error'];
    let currentFilter = 'all';
    let state = { agents: [], logs: [] };
    let startedAtMs = Date.now();
    const seenLogIds = new Set();

    const filterBar = document.getElementById('filters');
    const agentList = document.getElementById('agentList');
    const logFeed = document.getElementById('logFeed');
    const stats = document.getElementById('stats');
    const uptime = document.getElementById('uptime');

    function secondsToClock(totalSeconds) {
      const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      const s = String(totalSeconds % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function elapsedSince(dateValue) {
      const start = new Date(dateValue).getTime();
      if (!start || Number.isNaN(start)) return '00:00:00';
      const seconds = Math.max(0, Math.floor((Date.now() - start) / 1000));
      return secondsToClock(seconds);
    }

    function buildFilters() {
      filterBar.innerHTML = '';
      for (const f of filters) {
        const button = document.createElement('button');
        button.className = `filter-btn${f === currentFilter ? ' active' : ''}`;
        button.textContent = f.toUpperCase();
        button.addEventListener('click', () => {
          currentFilter = f;
          buildFilters();
          renderLogs();
        });
        filterBar.appendChild(button);
      }
    }

    function renderAgents() {
      const list = state.agents || [];
      if (!list.length) {
        agentList.innerHTML = '<div class="empty">No agents registered yet.</div>';
        return;
      }
      agentList.innerHTML = '';
      for (const agent of list) {
        const card = document.createElement('div');
        card.className = 'agent-card';
        const running = agent.status === 'running';
        const startedText = elapsedSince(agent.startedAt || agent.lastSeen || new Date().toISOString());
        const lastSeenText = agent.lastSeen ? new Date(agent.lastSeen).toLocaleTimeString() : '-';
        card.innerHTML = `
          <div class="agent-head">
            <strong>${agent.name || 'unknown-agent'}</strong>
            <span><span class="status-dot ${running ? 'status-running' : 'status-stopped'}"></span>${running ? 'running' : 'stopped'}</span>
          </div>
          <div class="agent-sub">running: ${startedText}</div>
          <div class="agent-sub">last seen: ${lastSeenText}</div>
        `;
        agentList.appendChild(card);
      }
    }

    function filteredLogs() {
      const logs = (state.logs || []).slice().reverse();
      if (currentFilter === 'all') return logs;
      return logs.filter((entry) => entry.level === currentFilter);
    }

    function rowIsNew(id) {
      if (!id) return false;
      if (seenLogIds.has(id)) return false;
      seenLogIds.add(id);
      return true;
    }

    function renderLogs() {
      const logs = filteredLogs();
      if (!logs.length) {
        logFeed.innerHTML = '<div class="empty">⏳ Waiting for agents to start...</div>';
        return;
      }

      logFeed.innerHTML = '';
      for (const entry of logs) {
        const row = document.createElement('div');
        row.className = `log-row level-${entry.level || 'info'}`;
        if (rowIsNew(entry.id)) {
          row.style.animation = 'slideIn 260ms ease';
        }
        const ts = entry.time ? new Date(entry.time).toLocaleTimeString() : '--:--:--';
        const level = (entry.level || 'info').toLowerCase();
        row.innerHTML = `
          <div class="log-meta">
            <span>${ts}</span>
            <span class="pill">${entry.agent || 'unknown'}</span>
            <span class="level-badge badge-${level}">${level}</span>
          </div>
          <div class="log-message">${(entry.message || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
        `;
        logFeed.appendChild(row);
      }
    }

    function countMatches(re) {
      return (state.logs || []).filter((entry) => re.test(entry.message || '')).length;
    }

    function renderStats() {
      const total = (state.logs || []).length;
      const bugs = countMatches(/URGENT|BUG/i);
      const posted = countMatches(/posted/i);
      const errors = (state.logs || []).filter((entry) => entry.level === 'error').length;

      stats.innerHTML = '';
      const cards = [
        ['Total Logs', total],
        ['Bugs Detected', bugs],
        ['Comments Posted', posted],
        ['Errors', errors]
      ];
      for (const [label, value] of cards) {
        const card = document.createElement('div');
        card.className = 'stat';
        card.innerHTML = `<div class="stat-label">${label}</div><div class="stat-value">${value}</div>`;
        stats.appendChild(card);
      }
    }

    async function loadLogs() {
      try {
        const res = await fetch('./logs.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        state = {
          agents: Array.isArray(data.agents) ? data.agents : [],
          logs: Array.isArray(data.logs) ? data.logs : []
        };
        const runningStarts = state.agents
          .filter((agent) => agent && agent.startedAt)
          .map((agent) => new Date(agent.startedAt).getTime())
          .filter((value) => !Number.isNaN(value));
        if (runningStarts.length) {
          startedAtMs = Math.min(...runningStarts);
        }
        renderAgents();
        renderLogs();
        renderStats();
      } catch (_err) {
        state = { agents: [], logs: [] };
        renderAgents();
        logFeed.innerHTML = '<div class="empty">⏳ Waiting for agents to start...</div>';
        renderStats();
      }
    }

    function tickUptime() {
      const seconds = Math.max(0, Math.floor((Date.now() - startedAtMs) / 1000));
      uptime.textContent = secondsToClock(seconds);
      renderAgents();
    }

    buildFilters();
    loadLogs();
    setInterval(loadLogs, 3000);
    setInterval(tickUptime, 1000);
  </script>
</body>
</html>
